<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sushiko WiFi</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #f5f1f1;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
}

/* 🌊 ONDAS FONDO */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: repeating-radial-gradient(
    circle at center,
    rgba(0,0,0,0.03) 0px,
    rgba(0,0,0,0.03) 1px,
    transparent 1px,
    transparent 60px
  );
}

/* 🌸 SAKURA */
.sakura {
  position: fixed;
  width: 8px;
  height: 8px;
  background: radial-gradient(circle, #ffc1cc, #ff6f91);
  border-radius: 50% 50% 50% 0;
  transform: rotate(45deg);
  opacity: 0.6;
  animation: fall linear infinite;
}

@keyframes fall {
  0% { transform: translateY(-10vh); }
  100% { transform: translateY(110vh); }
}

/* TARJETA */
.container {
  position: relative;
  width: 90%;
  max-width: 380px;
  padding: 40px 30px;
  border-radius: 28px;
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(20px);
  box-shadow: 0 30px 80px rgba(0,0,0,0.08);
  text-align: center;
  overflow: hidden;
}

/* 🌊 ONDAS INTERNAS */
.container::before {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-radial-gradient(
    circle at 50% 90px,
    rgba(0,0,0,0.04) 0px,
    rgba(0,0,0,0.04) 1px,
    transparent 1px,
    transparent 55px
  );
}

/* LOGO + ONDAS */
.logo-wrapper {
  position: relative;
  margin-bottom: 10px;
}

.logo-wrapper::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 280px;
  height: 280px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: repeating-radial-gradient(
    circle,
    rgba(0,0,0,0.05) 0px,
    rgba(0,0,0,0.05) 1px,
    transparent 1px,
    transparent 40px
  );
}

.logo {
  width: 240px;
  position: relative;
}

/* TEXTOS */
h2 { margin: 15px 0 5px; }
p { color: #888; font-size: 14px; }

/* INPUTS */
input {
  width: 100%;
  padding: 15px;
  margin: 7px 0;
  border-radius: 14px;
  border: none;
  background: #f4f4f4;
}

/* BOTÓN */
button {
  width: 100%;
  padding: 15px;
  margin-top: 20px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(135deg, #f2a7a7, #e07b7b);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* ERROR */
.error {
  border: 2px solid red;
}

/* RESPONSIVE */
@media (max-width: 400px) {
  .logo { width: 200px; }
}
</style>
</head>

<body>

<!-- 🌸 SAKURA -->
<script>
for (let i = 0; i < 6; i++) {
  const s = document.createElement("div");
  s.className = "sakura";
  s.style.left = Math.random() * 100 + "vw";
  s.style.animationDuration = (8 + Math.random() * 5) + "s";
  document.body.appendChild(s);
}
</script>

<div class="container">

  <div class="logo-wrapper">
    <img src="logo.png" class="logo">
  </div>

  <h2>Conéctate en un clic</h2>
  <p>Accede al WiFi y recibe promociones</p>

  <form id="wifiForm">

    <input id="nombre" type="text" placeholder="Nombre completo" required>
    <input id="telefono" type="tel" placeholder="Teléfono (10 dígitos)" required>
    <input id="email" type="email" placeholder="Correo electrónico" required>
    <input id="fecha" type="date" required>

    <label>
      <input id="consentimiento" type="checkbox">
      Acepto recibir promociones
    </label>

    <p>
      <a href="terminos.html">Ver términos y condiciones</a>
    </p>

    <button type="submit">ACEPTAR</button>

  </form>

</div>

<script>

// VALIDACIONES
function validar() {
  let ok = true;

  const nombre = document.getElementById("nombre");
  const telefono = document.getElementById("telefono");
  const email = document.getElementById("email");

  nombre.classList.remove("error");
  telefono.classList.remove("error");
  email.classList.remove("error");

  if (nombre.value.trim().length < 3) {
    nombre.classList.add("error");
    ok = false;
  }

  if (!/^[0-9]{10}$/.test(telefono.value)) {
    telefono.classList.add("error");
    ok = false;
  }

  if (!/^[^@]+@[^@]+\.[a-zA-Z]{2,}$/.test(email.value)) {
    email.classList.add("error");
    ok = false;
  }

  return ok;
}

// ENVÍO + LOGIN MIKROTIK
document.getElementById("wifiForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  if (!validar()) {
    alert("Revisa los datos");
    return;
  }

  const data = {
    nombre: document.getElementById("nombre").value,
    telefono: document.getElementById("telefono").value,
    email: document.getElementById("email").value,
    fecha_nacimiento: document.getElementById("fecha").value,
    consentimiento: document.getElementById("consentimiento").checked
  };

  try {
    await fetch("https://sushiko-backend.onrender.com/api/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    alert("Conectado correctamente 🎉");

    // 🔥 LOGIN AUTOMÁTICO MIKROTIK
    window.location.href = "$(link-login-only)?username=guest&password=guest";

  } catch (err) {
    alert("Error al conectar");
  }
});

</script>

</body>
</html>
