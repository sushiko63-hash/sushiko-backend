<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sushiko WiFi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(-45deg, #f5e6e8, #f8d7da, #f2c6c9, #fdecef);
  background-size: 400% 400%;
  animation: fondo 10s ease infinite;
}

@keyframes fondo {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.container {
  max-width: 400px;
  margin: 40px auto;
  background: white;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.logo {
  width: 180px;
  margin-bottom: 15px;
}

h2 {
  margin: 10px 0;
}

.social {
  margin: 15px 0;
}

.social button {
  border-radius: 50%;
  width: 45px;
  height: 45px;
  border: 1px solid #ccc;
  margin: 5px;
  font-size: 18px;
  cursor: pointer;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button.submit {
  width: 100%;
  padding: 14px;
  border-radius: 30px;
  background: #e48a8a;
  border: none;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.small {
  font-size: 12px;
  color: #888;
}
</style>
</head>

<body>

<div class="container">
  <img src="logo.png" class="logo">

  <h2>Conéctate en un clic</h2>
  <p>Accede al WiFi y recibe promociones</p>

  <div class="social">
    <button>G</button>
    <button>f</button>
  </div>

  <form id="form">
    <input type="text" id="nombre" placeholder="Nombre" required>
    <input type="text" id="telefono" placeholder="Teléfono" required>
    <input type="email" id="email" placeholder="Correo electrónico" required>
    <input type="date" id="fecha" required>

    <label>
      <input type="checkbox" id="consentimiento" required>
      Acepto recibir promociones
    </label>

    <p class="small">
      <a href="terminos.html" target="_blank">Ver términos y condiciones</a>
    </p>

    <button class="submit">ACEPTAR</button>
  </form>
</div>

<script>
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    nombre: document.getElementById("nombre").value,
    telefono: document.getElementById("telefono").value,
    email: document.getElementById("email").value,
    fecha_nacimiento: document.getElementById("fecha").value,
    consentimiento: document.getElementById("consentimiento").checked
  };

  try {
    const res = await fetch("https://sushiko-backend.onrender.com/api/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (result.success) {
      alert("Conectado correctamente 🎉");
    }
  } catch (err) {
    alert("Error de conexión");
  }
});
</script>

</body>
</html>
